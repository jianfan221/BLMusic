name: Build

on:
  push:
    tags:
      - '*'
    paths-ignore:
      - ".github/**"
      - "README.md"
      - ".luarc.json"
      - "annotations.lua"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: BigWigsMods/packager@master
        with:
          args: -p 1584248 -a BNBmrqGx
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_KEY: ${{ secrets.WAGO_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
